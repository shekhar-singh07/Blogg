{% extends 'base.html' %}

{% block title %}Create Post — DevBlog{% endblock %}

{% block content %}
<div style="max-width: 780px; margin: 0 auto;">
    <a href="{% url 'home' %}" class="back-link">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to posts
    </a>

    <div class="form-card">
        <div class="form-header">
            <h1>Write a New Post</h1>
            <p>Share your ideas, tutorials, or stories with the community.</p>
        </div>
        <div class="form-body">
            <form method="POST" enctype="multipart/form-data" id="post-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" class="form-control" placeholder="Give your post a great title..." required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select name="category" id="category" class="form-control">
                            <option value="">— Select category —</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tags">Tags <span style="color: var(--text-tertiary); font-weight: 400;">(comma separated)</span></label>
                        <input type="text" name="tags" id="tags" class="form-control" placeholder="python, django, web">
                    </div>
                </div>

                <div class="form-group">
                    <label for="cover_image">Cover Image <span style="color: var(--text-tertiary); font-weight: 400;">(optional)</span></label>
                    <input type="file" name="cover_image" id="cover_image" class="form-control" accept="image/*" style="padding: 8px;">
                </div>

                <div class="form-group">
                    <label>Content</label>
                    <div id="editor-container"></div>
                    <input type="hidden" name="content" id="content-hidden" required>
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; padding-top: 20px; border-top: 1px solid var(--border-light);">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label for="status" style="font-size: 13px; font-weight: 600; color: var(--text-secondary); margin: 0;">Status:</label>
                        <select name="status" id="status" class="form-control" style="width: auto; padding: 6px 32px 6px 10px; font-size: 13px;">
                            <option value="published" selected>Publish Now</option>
                            <option value="draft">Save as Draft</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <a href="{% url 'home' %}" class="btn btn-ghost btn-sm">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                            Publish
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Start writing your story...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    document.querySelector('#post-form').onsubmit = function() {
        document.querySelector('#content-hidden').value = quill.root.innerHTML;
        if (quill.getText().trim().length === 0) {
            alert("Please write some content.");
            return false;
        }
    };
});
</script>
{% endblock %}
