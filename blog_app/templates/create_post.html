{% extends 'base.html' %}
{% load blog_extras %}

{% block content %}
<div style="max-width: 840px; margin: 0 auto;">
    <div class="detail-meta-row">
        <a href="{% url 'home' %}" class="page-btn">
            &larr; Back to Feed
        </a>
    </div>

    <div class="auth-card" style="max-width: none; padding: 48px;">
        <div class="auth-header" style="text-align: left;">
            <h2>Write a New Article</h2>
            <p>Share your technical insights with the world</p>
        </div>

        <form method="POST" enctype="multipart/form-data" id="post-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Article Title</label>
                <input type="text" name="title" class="form-input" style="font-size: 24px; font-weight: 700;" placeholder="Enter a descriptive title..." required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-input">
                        <option value="">Select a category</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Tags</label>
                    <input type="text" name="tags" class="form-input" placeholder="e.g. python, tutorial, news">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Cover Image</label>
                <input type="file" name="cover_image" class="form-input" accept="image/*">
                <p class="form-help">Optimal size: 1200x630px. Max size: 5MB.</p>
            </div>

            <div class="form-group">
                <label class="form-label">Content</label>
                <div id="editor-container"></div>
                <input type="hidden" name="content" id="content-hidden" required>
            </div>

            <div class="profile-header-main" style="padding-top: 32px; border-top: 1px solid var(--border-color); margin-top: 40px;">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <label class="form-label" style="margin-bottom: 0;">Publishing Options</label>
                    <select name="status" class="form-input" style="width: auto;">
                        <option value="published" selected>Published</option>
                        <option value="draft">Draft</option>
                    </select>
                </div>
                <div class="profile-actions">
                    <a href="{% url 'home' %}" class="page-btn">Cancel</a>
                    <button type="submit" class="btn-pro">Publish Article</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Fuel the curiosity of other developers...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    document.querySelector('#post-form').onsubmit = function() {
        document.querySelector('#content-hidden').value = quill.root.innerHTML;
        if (quill.getText().trim().length === 0) {
            alert("Your article needs some content!");
            return false;
        }
    };
});
</script>
{% endblock %}
