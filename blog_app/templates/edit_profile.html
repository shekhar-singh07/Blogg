{% extends 'base.html' %}

{% block title %}Edit Profile — DevBlog{% endblock %}

{% block content %}
<div style="max-width: 560px; margin: 0 auto;">
    <a href="{% url 'user_profile' user.username %}" class="back-link">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to profile
    </a>

    <div class="form-card">
        <div class="form-header">
            <h1>Edit Profile</h1>
            <p>Update your personal information and avatar.</p>
        </div>
        <div class="form-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group" style="text-align: center; margin-bottom: 28px;">
                    <div style="width: 88px; height: 88px; border-radius: 50%; background: var(--gradient-1); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: white; overflow: hidden; border: 3px solid var(--border-color);">
                        {% if profile.avatar %}
                            <img src="{{ profile.avatar.url }}" alt="" style="width: 100%; height: 100%; object-fit: cover;">
                        {% else %}
                            {{ user.username|slice:":2"|upper }}
                        {% endif %}
                    </div>
                    <label for="avatar" style="cursor: pointer; color: var(--accent); font-weight: 600; font-size: 13px;">Change avatar</label>
                    <input type="file" name="avatar" id="avatar" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea name="bio" id="bio" class="form-control" style="min-height: 100px;" placeholder="Tell us about yourself...">{{ profile.bio }}</textarea>
                </div>

                <div class="form-actions">
                    <a href="{% url 'user_profile' user.username %}" class="btn btn-ghost btn-sm">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
