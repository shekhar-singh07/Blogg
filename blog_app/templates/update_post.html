{% extends 'base.html' %}

{% block title %}Edit Post — DevBlog{% endblock %}

{% block content %}
<div style="max-width: 680px; margin: 0 auto;">
    <a href="{% url 'post_detail' post.pk %}" class="back-link">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to post
    </a>

    <div class="form-card">
        <div class="form-header">
            <h1>✏️ Edit Post</h1>
            <p>Update your article below.</p>
        </div>
        <div class="form-body">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" class="form-control" value="{{ post.title }}" required>
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea name="content" id="content" class="form-control" required>{{ post.content }}</textarea>
                </div>
                <div class="form-actions">
                    <a href="{% url 'post_detail' post.pk %}" class="btn btn-ghost btn-sm">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
