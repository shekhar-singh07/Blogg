{% extends 'base.html' %}

{% block title %}Log in — DevBlog{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 28px;">
            <div style="width: 48px; height: 48px; border-radius: 12px; background: var(--gradient-1); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px;">D</div>
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to your DevBlog account</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px; margin-top: 4px;">
                Log in
            </button>
        </form>

        <div class="auth-divider">
            Don't have an account? <a href="{% url 'register' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
