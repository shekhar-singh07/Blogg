{% extends 'base.html' %}

{% block title %}Join DevBlog — DevBlog{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join the community of developers</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email <span style="color: var(--text-tertiary); font-weight: 400;">(optional)</span></label>
                <input type="email" name="email" id="email" class="form-input" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-input" placeholder="At least 6 characters" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password2">Confirm Password</label>
                <input type="password" name="password2" id="password2" class="form-input" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn-pro btn-full">
                Join Now
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
