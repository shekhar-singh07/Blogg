{% extends 'base.html' %}

{% block title %}Sign up — DevBlog{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 28px;">
            <div style="width: 48px; height: 48px; border-radius: 12px; background: var(--gradient-1); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px;">D</div>
            <h1>Create your account</h1>
            <p class="subtitle">Join the DevBlog community today</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email <span style="color: var(--text-tertiary); font-weight: 400;">(optional)</span></label>
                <input type="email" name="email" id="email" class="form-control" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="At least 6 characters" required>
            </div>
            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" name="password2" id="password2" class="form-control" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px; margin-top: 4px;">
                Create Account
            </button>
        </form>

        <div class="auth-divider">
            Already have an account? <a href="{% url 'login' %}">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
